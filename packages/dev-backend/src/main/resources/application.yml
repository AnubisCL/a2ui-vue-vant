server:
  port: 8080

spring:
  application:
    name: a2ui-backend

# A2UI Configuration
a2ui:
  # LLM Provider Configuration
  llm:
    # LLM provider type: openai, azure-openai, etc.
    provider: openai
    # API key for the LLM provider (set via environment variable for production)
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    # Model to use (gpt-4o-mini, gpt-4-turbo-preview, gpt-4, etc.)
    model: gpt-4o-mini
    # Temperature for response generation (0.0 - 2.0)
    temperature: 0.7
    # Maximum tokens in response
    max-tokens: 4096
    # Request timeout in milliseconds
    timeout: 60000
    # Optional: Base URL for custom API endpoints
    # base-url: https://api.openai.com/v1

  # Transport Configuration
  transport:
    # HTTP Streaming (SSE) settings
    sse:
      enabled: true
      endpoint: /api/chat/stream
    # WebSocket settings
    websocket:
      enabled: true
      endpoint: /ws/chat

  # Demo Mode Configuration (when LLM is not available)
  demo:
    enabled: true
    streaming-delay-ms: 100
    enable-charts: true
    enable-forms: true
    enable-tables: true

  # CORS Configuration
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8081
      - http://localhost:4173
    allowed-methods:
      - GET
      - POST
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

# Logging Configuration
logging:
  level:
    root: INFO
    com.a2ui: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Spring Boot Actuator (optional, for monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
