server:
  port: 8080

spring:
  application:
    name: a2ui-backend

# A2UI Configuration
a2ui:
  # LLM Provider Configuration
  llm:
    # LLM provider type: openai, glm, azure-openai, etc.
    provider: glm
    # API key for the LLM provider (set via environment variable for production)
    api-key: ${GLM_AI_API_KEY}
    # Model to use (glm-4, glm-4-plus, glm-4v, glm-4-flash, etc.)
    model: glm-5
    # Base URL for GLM API
    base-url: https://open.bigmodel.cn/api/coding/paas/v4
    # Temperature for response generation (0.0 - 2.0)
    temperature: 0.7
    # Maximum tokens in response
    max-tokens: 4096
    # Request timeout in milliseconds
    timeout: 120000
    # Enable streaming
    streaming: true

  # Demo Mode Configuration (when LLM is not available or API key is not set)
  demo:
    enabled: true
    # When true, always use LLM even if a demo scenario matches (for testing LLM)
    bypass-demo: true
    streaming-delay-ms: 100
    enable-charts: true
    enable-forms: true
    enable-tables: true

  # Transport Configuration
  transport:
    # HTTP Streaming (SSE) settings
    sse:
      enabled: true
      endpoint: /api/chat/stream
    # WebSocket settings
    websocket:
      enabled: true
      endpoint: /ws/chat

  # CORS Configuration
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8081
      - http://localhost:4173
    allowed-methods:
      - GET
      - POST
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

# Logging Configuration
logging:
  level:
    root: INFO
    com.a2ui: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Spring Boot Actuator (optional, for monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
